<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predict - Rising Waters</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🌊 Rising Waters</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/index">Predict</a>
        </div>
    </nav>

    <div class="predict-wrapper">
        <div class="predict-container">
            <h1>🔍 Flood Risk Prediction</h1>
            <p class="subtitle">Enter current weather parameters to assess flood risk</p>

            <form action="/predict" method="POST" id="predictForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>🌡️ Temperature (°C)</label>
                        <input type="number" step="any" name="Temp"
                               placeholder="e.g. 29" required>
                    </div>
                    <div class="form-group">
                        <label>💧 Humidity (%)</label>
                        <input type="number" step="any" name="Humidity"
                               placeholder="e.g. 73" required>
                    </div>
                    <div class="form-group">
                        <label>☁️ Cloud Cover (%)</label>
                        <input type="number" step="any" name="Cloud Cover"
                               placeholder="e.g. 36" required>
                    </div>
                    <div class="form-group">
                        <label>🌧️ Annual Rainfall (mm)</label>
                        <input type="number" step="any" name="ANNUAL"
                               placeholder="e.g. 2925" required>
                    </div>
                    <div class="form-group">
                        <label>❄️ Jan-Feb Rainfall (mm)</label>
                        <input type="number" step="any" name="Jan-Feb"
                               placeholder="e.g. 73" required>
                    </div>
                    <div class="form-group">
                        <label>🌸 Mar-May Rainfall (mm)</label>
                        <input type="number" step="any" name="Mar-May"
                               placeholder="e.g. 386" required>
                    </div>
                    <div class="form-group">
                        <label>⛈️ Jun-Sep Rainfall (mm)</label>
                        <input type="number" step="any" name="Jun-Sep"
                               placeholder="e.g. 2122" required>
                    </div>
                    <div class="form-group">
                        <label>🍂 Oct-Dec Rainfall (mm)</label>
                        <input type="number" step="any" name="Oct-Dec"
                               placeholder="e.g. 666" required>
                    </div>
                    <div class="form-group">
                        <label>☔ Avg June Rainfall (mm)</label>
                        <input type="number" step="any" name="avgjune"
                               placeholder="e.g. 274" required>
                    </div>
                    <div class="form-group">
                        <label>🌊 Sub Rainfall (mm)</label>
                        <input type="number" step="any" name="sub"
                               placeholder="e.g. 649" required>
                    </div>
                </div>

                <button type="submit" class="btn-predict" id="submitBtn">
                    🔍 Predict Flood Risk
                </button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
